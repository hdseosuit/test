name: RDP Tailscale RustDesk Fixed DNS Display

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime minutes max 360"
        required: false
        default: "355"
      crd_code:
        description: "Optional Chrome Remote Desktop code"
        required: false
        default: ""
      crd_pin:
        description: "CRD PIN 6-12 digits"
        required: false
        default: "123456"

permissions:
  contents: read

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 370

    env:
      RDP_USER: Bullettemporary
      RDP_PASS: ${{ secrets.RDP_PASSWORD }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}

    steps:
      - name: Validate Secrets
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAILSCALE_AUTHKEY)) {
            Write-Error "TAILSCALE_AUTHKEY secret is empty."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($env:RDP_PASS)) {
            Write-Error "RDP_PASSWORD secret is empty."
            exit 1
          }

          if ($env:RDP_PASS.Length -lt 12) {
            Write-Error "RDP_PASSWORD must be at least 12 characters."
            exit 1
          }

          Write-Host "Secrets OK."

      - name: Install Tailscale
        shell: powershell
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (-not (Test-Path $ts)) {
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
            $dst = "$env:TEMP\tailscale.msi"

            Write-Host "Downloading Tailscale..."
            Invoke-WebRequest -Uri $url -OutFile $dst

            Write-Host "Installing Tailscale..."
            Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait

            Remove-Item $dst -Force -ErrorAction SilentlyContinue
          }

          Write-Host "Tailscale installed."

      - name: Connect Tailscale
        shell: powershell
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (-not (Test-Path $ts)) {
            Write-Error "tailscale.exe not found."
            exit 1
          }

          $env:TS_AUTHKEY = $env:TAILSCALE_AUTHKEY

          & $ts logout | Out-Null

          & $ts up `
            --hostname "bullet-${{ github.run_id }}" `
            --accept-dns=false `
            --accept-routes=false

          Start-Sleep -Seconds 8

          $ip4 = & $ts ip -4 | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($ip4)) {
            Write-Error "Could not get Tailscale IP."
            exit 1
          }

          "TAILSCALE_IP=$ip4" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Tailscale IPv4: $ip4"

      - name: Fix DNS
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "Fixing DNS..."

          $adapters = Get-NetAdapter | Where-Object {
            $_.Status -eq "Up" -and $_.InterfaceDescription -notmatch "Tailscale"
          }

          foreach ($adapter in $adapters) {
            try {
              Write-Host "Setting DNS for adapter: $($adapter.Name)"
              Set-DnsClientServerAddress `
                -InterfaceIndex $adapter.InterfaceIndex `
                -ServerAddresses ("1.1.1.1","8.8.8.8")
            } catch {
              Write-Host "Could not set DNS for adapter: $($adapter.Name)"
            }
          }

          ipconfig /flushdns

          Write-Host "DNS fixed."

      - name: Create RDP User and Enable Remote Desktop
        shell: powershell
        run: |
          $u = $env:RDP_USER
          $p = $env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force

          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
          }

          Add-LocalGroupMember -Group "Administrators" -Member $u -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u -ErrorAction SilentlyContinue

          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" `
            -Value 0

          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "UserAuthentication" `
            -Value 1

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null

          Write-Host "RDP enabled."
          Write-Host "Username: $u"
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"

      - name: Install RustDesk
        shell: powershell
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"

          if (-not (Test-Path $rdExe)) {
            $rdUrl = "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.msi"
            $installerPath = "$env:TEMP\rustdesk.msi"

            Write-Host "Downloading RustDesk..."
            Invoke-WebRequest -Uri $rdUrl -OutFile $installerPath

            Write-Host "Installing RustDesk..."
            Start-Process msiexec.exe -ArgumentList "/i","`"$installerPath`"","/quiet","/norestart" -Wait

            Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
          }

          if (-not (Test-Path $rdExe)) {
            Write-Error "RustDesk was not installed."
            exit 1
          }

          Write-Host "RustDesk installed."

      - name: Open RustDesk Ports
        shell: powershell
        continue-on-error: true
        run: |
          for ($p = 21115; $p -le 21119; $p++) {
            netsh advfirewall firewall delete rule name="RustDesk-TCP-$p" 2>$null
            netsh advfirewall firewall add rule name="RustDesk-TCP-$p" dir=in action=allow protocol=TCP localport=$p
          }

          netsh advfirewall firewall delete rule name="RustDesk-UDP-21116" 2>$null
          netsh advfirewall firewall add rule name="RustDesk-UDP-21116" dir=in action=allow protocol=UDP localport=21116

          Write-Host "RustDesk ports opened."

      - name: Launch RustDesk
        shell: powershell
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"

          Start-Process -FilePath $rdExe -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 6

          Write-Host "RustDesk launched."

      - name: Optional Install Chrome Remote Desktop
        if: ${{ inputs.crd_code != '' }}
        shell: powershell
        continue-on-error: true
        run: |
          $pin = "${{ inputs.crd_pin }}".Trim()

          if ($pin -notmatch '^\d{6,12}$') {
            Write-Error "CRD PIN must be 6-12 digits."
            exit 1
          }

          $starter = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"

          if (-not (Test-Path $starter)) {
            $msi = "$env:TEMP\chromeremotedesktophost.msi"

            Write-Host "Downloading Chrome Remote Desktop..."
            Invoke-WebRequest `
              -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" `
              -OutFile $msi

            Write-Host "Installing Chrome Remote Desktop..."
            Start-Process msiexec.exe -ArgumentList "/i","`"$msi`"","/quiet","/norestart" -Wait

            Remove-Item $msi -Force -ErrorAction SilentlyContinue
          }

          $raw = @'
          ${{ inputs.crd_code }}
          '@.Trim()

          if ($raw -match '--code\s*=\s*"?([^"\s]+)') {
            $code = ([regex]::Match($raw,'--code\s*=\s*"?([^"\s]+)')).Groups[1].Value
          } elseif ($raw -match '^4\/') {
            $code = $raw
          } else {
            Write-Error "Could not detect CRD code."
            exit 1
          }

          $redir = "https://remotedesktop.google.com/_/oauthredirect"
          $name = $env:COMPUTERNAME

          $args = @(
            "--code=""$code""",
            "--redirect-url=""$redir""",
            "--name=""$name""",
            "--pin=""$pin"""
          )

          Start-Process -FilePath $starter -ArgumentList $args
          Write-Host "Chrome Remote Desktop launched."

      - name: Check Display Adapter
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "=============================="
          Write-Host "DISPLAY ADAPTER INFO"
          Write-Host "=============================="

          try {
            Get-CimInstance Win32_VideoController |
              Format-List Name, AdapterRAM, DriverVersion, VideoProcessor, CurrentHorizontalResolution, CurrentVerticalResolution
          } catch {
            Write-Host "Could not read video controller info."
          }

          Write-Host "=============================="
          Write-Host "DIRECTX INFO"
          Write-Host "=============================="

          $dxFile = Join-Path $env:TEMP "dxdiag.txt"

          try {
            if (Test-Path $dxFile) {
              Remove-Item $dxFile -Force -ErrorAction SilentlyContinue
            }

            Start-Process -FilePath "dxdiag.exe" -ArgumentList "/t `"$dxFile`"" -Wait -NoNewWindow
            Start-Sleep -Seconds 5

            if (Test-Path $dxFile) {
              Get-Content $dxFile |
                Select-String "Card name|Display Memory|Dedicated Memory|Shared Memory|Driver Model|DirectX|Feature Levels"
            } else {
              Write-Host "dxdiag file was not created. Skipping dxdiag output."
            }
          } catch {
            Write-Host "dxdiag failed. Skipping."
          }

          Write-Host "Display check finished."

      - name: Show Connection Details
        shell: powershell
        run: |
          Write-Host "=============================="
          Write-Host "CONNECTION DETAILS"
          Write-Host "=============================="
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          Write-Host "RDP Port: 3389"
          Write-Host "Username: $env:RDP_USER"
          Write-Host "Password: Use your GitHub Secret RDP_PASSWORD"
          Write-Host "RustDesk is opened on the desktop."
          Write-Host "=============================="

      - name: Keep Alive
        shell: powershell
        run: |
          $mins = [int]"${{ inputs.runtime_minutes }}"

          if ($mins -lt 5) {
            $mins = 355
          }

          if ($mins -gt 360) {
            $mins = 355
          }

          $end = (Get-Date).AddMinutes($mins)

          while ((Get-Date) -lt $end) {
            Write-Host "RDP online | IP: $env:TAILSCALE_IP | Ends: $end"
            Start-Sleep -Seconds 60
          }
