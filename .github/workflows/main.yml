name: Setup RDP Server

on:
  workflow_dispatch:

jobs:
  setup-rdp:
    runs-on: windows-2022

    steps:
      - name: Install & Connect Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=gh-rdp-${{ github.run_id }}

          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          "TAILSCALE_IP=$tsIP" | Out-File -Append $env:GITHUB_ENV

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" `
            -Value 0

          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "UserAuthentication" `
            -Value 1

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set RDP User Password
        shell: powershell
        run: |
          $username = "runneradmin"
          $password = "${{ secrets.RDP_PASSWORD }}"

          if ([string]::IsNullOrWhiteSpace($password)) {
              Write-Error "RDP_PASSWORD secret is empty. Add it in GitHub Secrets."
              exit 1
          }

          net user $username $password

          Write-Host "RDP password has been set for user: $username"

      - name: Make Sure RDP Service Is Running
        shell: powershell
        run: |
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService -ErrorAction SilentlyContinue

          Write-Host "Remote Desktop service is running."

      - name: Show Connection Details
        shell: powershell
        run: |
          Write-Host "======================="
          Write-Host "RDP CONNECTION DETAILS:"
          Write-Host "Computer: $($env:TAILSCALE_IP)"
          Write-Host "Port: 3389"
          Write-Host "Username: runneradmin"
          Write-Host "Password: Use your GitHub Secret RDP_PASSWORD"
          Write-Host "======================="

      - name: Keep Alive
        shell: powershell
        run: |
          $endTime = (Get-Date).AddHours(6)

          while ((Get-Date) -lt $endTime) {
              Write-Host "RDP is still online | $(Get-Date)"
              Start-Sleep -Seconds 60
          }
